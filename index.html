<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mermaid.js Editor</title>
  <link rel="stylesheet" href="./style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=JetBrains+Mono:wght@400;700&display=swap"
    rel="stylesheet">
</head>

<body>
  <div class="app-container">
    <header>
      <div class="logo">
        <h1>Mermaid<span class="highlight">Editor</span></h1>
      </div>
      <div class="actions">
        <button id="themeBtn" class="btn btn-secondary">
          <!-- Icon will be set by JS -->
          <span>Theme</span>
        </button>
        <button id="copyBtn" class="btn btn-secondary">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          </svg>
          Copy PNG
        </button>
        <button id="downloadBtn" class="btn btn-secondary">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
          Download PNG
        </button>
      </div>
    </header>

    <main class="editor-grid">
      <section class="editor-pane">
        <div class="pane-header">
          <h2>Source Code</h2>
          <span class="badge">Live</span>
        </div>
        <div id="editor-container"></div>
      </section>

      <section class="preview-pane">
        <div id="preview-container" class="preview-container">
          <div id="graph-output" class="mermaid"></div>
        </div>
      </section>
    </main>
  </div>
  <script type="module" src="./main.js"></script>
</body>

</html>
